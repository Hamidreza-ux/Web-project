<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPage</title>
    <link rel="stylesheet" href="ChatPage.css">
    <script src="Chatpage.js" defer></script>
</head>
<body>

<div class="chat-container">
    <div class="search-bar-container">
        <button class="back-btn" onclick="goBack()">&#10142;</button>
        <input type="text" id="search-input" placeholder="جستجو بین پیام‌ها..." oninput="loadMessages()">
    </div>

    <div class="chat-header">
        <div class="user-info" onclick="openInfoModal()">
            <img class="avatar" id="chat-avatar" src="" alt="Avatar">
            <div class="header-text">
                <span class="username" id="chat-name">بارگذاری...</span>
                <span class="status-info" id="chat-status"></span>
            </div>
        </div>
        
        <div class="dropdown">
            <button onclick="toggleMenu(event)" class="menu-btn">&#8942;</button>
            <div id="chat-options-menu" class="dropdown-content"></div>
        </div>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="chat-footer">
        <label class="file-label">
            <input type="checkbox" id="file-checkbox"> 📁 فایل
        </label>
        <input type="text" id="msg-input" placeholder="پیام خود را بنویسید...">
        <button onclick="sendMessage()">ارسال</button>
    </div>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeInfoModal()">&times;</span>
        <h3 id="modal-title">اطلاعات</h3>
        <div id="modal-details"></div>
        <div id="modal-history-section" style="display:none;">
            <h4>تاریخچه گفتگو (پیام‌های حذف شده و نسخه‌های قبل ویرایش)</h4>
            <div id="history-lists"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
