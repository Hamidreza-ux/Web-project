<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPage</title>
    <link rel="stylesheet" href="ChatPage.css">
</head>
<body>

<div class="chat-wrapper">
    <!-- هدر چت طبق تصویر -->
    <header class="chat-header">
        <div class="user-info">
            <button class="back-btn" onclick="goBack()">←</button>
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Felix" id="chat-avatar" alt="avatar" class="avatar">
            <div class="user-details">
                <span class="user-name" id="chat-name">نام مخاطب/گروه</span>
                <span class="status" id="chat-status">آنلاین</span>
            </div>
        </div>
        <button class="menu-btn" onclick="toggleMenu(event)">⋮</button>
        <div id="chat-options-menu" class="dropdown-content"></div>
    </header>

    <!-- ناحیه پیام‌ها -->
    <main class="chat-body" id="chat-box"></main>

    <!-- فوتر با قابلیت ارسال فایل -->
    <footer class="chat-footer">
        <button class="file-attach-btn" id="fileAttachBtn">📎</button>
        <input type="file" id="fileInput" style="display: none;">
        <input type="text" placeholder="نوشتن پیام..." class="message-input" id="msg-input">
        <input type="checkbox" id="file-checkbox" style="display:none;">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">ارسال</button>
    </footer>
</div>

<script src="Chatpage.js"></script>
</body>
</html>
