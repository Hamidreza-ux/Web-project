<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAT</title>
    <link rel="stylesheet" href="justMainPage.css">
</head>
<body>

<div class="app-layout">

    <!-- ============ سایدبار چپ ============ -->
    <aside class="sidebar">

        <!-- هدر سایدبار -->
        <div class="sidebar-header">
            <div class="sidebar-title">MAT</div>
            <div class="sidebar-actions">
                <!--        کلید رفتن به تنظیمات    -->
                <button class="icon-btn" id="settingsBtn" title="تنظیمات" onclick="window.location.href='Setting.html'">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                    </svg>
                </button>
                <!-- TODO: اگر نام فایل چت جدید تغییر کرد، لینک زیر را آپدیت کنید -->
                <button class="icon-btn" id="newChatBtn" title="چت جدید" onclick="window.location.href='CreateChat.html'">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- جستجوی چت‌ها -->
        <div class="search-box">
            <svg class="search-icon-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="searchInput" placeholder="جستجوی گفتگوها..." />
        </div>

        <!-- لیست چت‌ها -->
        <div class="chat-list" id="chatList">

            <!-- آرشیو - همیشه در بالا نمایش داده می‌شود -->
            <div class="archive-row" id="archiveRow" onclick="toggleArchive()">
                <div class="archive-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5zM5.12 5l.81-1h12l.94 1H5.12z"/>
                    </svg>
                </div>
                <span class="archive-label">گفتگوهای آرشیو شده</span>
                <span class="archive-count" id="archiveCount" style="display:none">0</span>
            </div>

            <!-- پیام‌های ذخیره شده - ثابت در بالا -->
            <div class="chat-item saved-messages-item" onclick="openSavedMessages()">
                <div class="avatar saved-avatar">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                </div>
                <div class="chat-item-info">
                    <div class="chat-item-top">
                        <span class="chat-item-name">پیام‌های ذخیره شده</span>
                    </div>
                    <div class="chat-item-last-msg" id="savedMsgPreview">بارگذاری...</div>
                </div>
            </div>

            <!-- چت‌های داینامیک اینجا اضافه می‌شوند توسط JS -->
            <div id="dynamicChats"></div>

            <!-- وضعیت خالی بودن -->
            <div class="empty-state" id="emptyState" style="display:none">
                <p>هیچ گفتگویی وجود ندارد</p>
                <p>با دکمه + یک گفتگو شروع کنید</p>
            </div>
        </div>

        <!-- دکمه چت جدید (شناور) -->
        <button class="fab-btn" id="fabNewChat" title="گفتگوی جدید" onclick="window.location.href='CreateChat.html'">
            +
        </button>
    </aside>

    <!-- ============ بخش اصلی چت ============ -->
    <main class="chat-area" id="chatArea">

        <!-- صفحه خوش‌آمدگویی - وقتی هیچ چتی انتخاب نشده -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">💬</div>
            <h2>خوش آمدید</h2>
            <p>یک گفتگو را از سمت راست انتخاب کنید یا گفتگوی جدیدی شروع کنید</p>
        </div>

        <!-- هدر چت -->
        <div class="chat-header" id="chatHeader" style="display:none">
            <button class="back-btn" id="backBtn" onclick="closeChat()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatHeaderName">نام مخاطب</div>
                <div class="chat-header-status" id="chatHeaderStatus">در حال بارگذاری...</div>
            </div>
            <div class="chat-header-actions">
                <!-- دکمه جستجو در پیام‌ها -->
                <button class="icon-btn" id="searchMsgBtn" title="جستجو در پیام‌ها" onclick="toggleMsgSearch()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
                <!-- دکمه اطلاعات چت -->
                <button class="icon-btn" id="chatInfoBtn" title="اطلاعات" onclick="openChatInfo()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- نوار جستجو در پیام‌ها -->
        <div class="msg-search-bar" id="msgSearchBar" style="display:none">
            <input type="text" id="msgSearchInput" placeholder="جستجو در پیام‌ها..." />
            <button onclick="clearMsgSearch()">✕</button>
        </div>

        <!-- بدنه پیام‌ها -->
        <div class="messages-body" id="messagesBody" style="display:none">
            <div class="messages-list" id="messagesList">
                <!-- پیام‌ها توسط JS اینجا اضافه می‌شوند -->
            </div>
        </div>

        <!-- منوی راست‌کلیک روی پیام -->
        <div class="msg-context-menu" id="msgContextMenu" style="display:none">
            <button onclick="editSelectedMessage()">✏️ ویرایش</button>
            <button onclick="deleteSelectedMessage()">🗑️ حذف</button>
            <button onclick="reportSelectedMessage()">🚩 گزارش</button>
        </div>

        <!-- ورودی پیام -->
        <div class="message-input-area" id="messageInputArea" style="display:none">
            <!-- نوار ویرایش پیام -->
            <div class="edit-bar" id="editBar" style="display:none">
                <span>در حال ویرایش پیام...</span>
                <button onclick="cancelEdit()">لغو</button>
            </div>

            <div class="input-row">
                <!-- ارسال فایل -->
                <button class="icon-btn attach-btn" title="ارسال فایل" onclick="document.getElementById('fileInput').click()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" />

                <!-- فیلد متن -->
                <textarea
                    id="messageInput"
                    placeholder="پیام بنویسید..."
                    rows="1"
                    maxlength="1000"
                    onkeydown="handleInputKeydown(event)"
                    oninput="autoResizeTextarea(this)"
                ></textarea>

                <!-- شمارنده کاراکتر -->
                <span class="char-counter" id="charCounter">0/1000</span>

                <!-- دکمه ارسال -->
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>

    </main>
</div>

<!-- پاپ‌آپ آرشیو -->
<div class="modal-overlay" id="archiveModal" style="display:none" onclick="closeArchiveModal(event)">
    <div class="modal-box">
        <div class="modal-header">
            <span>گفتگوهای آرشیو شده</span>
            <button onclick="closeArchiveModal()">✕</button>
        </div>
        <div class="modal-body" id="archiveList">
            <!-- چت‌های آرشیو شده توسط JS اضافه می‌شوند -->
        </div>
    </div>
</div>

<script src="Mainpage.js"></script>
</body>
</html>
