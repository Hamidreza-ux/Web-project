<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="MainPage.css">
    <script src="setting.js" defer></script>
</head>
<body>
    <div class="app-container">
        
        <div class="header">
            <a href="MainPage.html" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
            <h1 class="header-main-title">تنظیمات</h1>
            <div class="spacer"></div>
        </div>

        <!-- پروفایل -->
        <a href="edit_profile.html" class="profile-section">
            <div class="avatar-wrapper">
                <!-- اینجا آیدی برای عکس پروفایل -->
                <img id="userAvatar" src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
                <div class="edit-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </div>
            </div>
        </a>

        <div class="list-container">
            <a href="edit_name.html" class="list-item">
                <div class="item-text">
                    <span class="item-label">نام کاربری</span>
                    <span id="displayName" class="item-value">نام کاربر</span> 
                </div>
            </a>
            
            <!-- شناسه کاربری -->
            <a href="edit_username.html" class="list-item">
                <div class="item-text">
                    <span class="item-label">شناسه کاربری</span>
                    <!-- اینجا آیدی برای نمایش شناسه -->
                    <span id="displayUsername" class="item-value">شناسه کاربر</span>
                </div>
            </a>

        <!-- ظاهر برنامه -->
            <a href="theme.html" class="list-item">
                <div class="item-text">
                    <span class="item-label">ظاهر</span>
                    <span id="displayTheme" class="item-value">روشن</span>
                </div>

                <svg class="item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </a>

            <!-- خروج از حساب و رفتن به صفحه لاگین -->
            <a href="index.html" class="list-item" onclick="alert('شما از حساب خود خارج شدید')">
                <span class="item-text-only">خروج از حساب کاربری</span>
                <img src="assets/log-in.svg" alt="">
            </a>

            <!-- رفتن به صفحه حذف حساب -->
            <a href="delete_account.html" class="list-item">
                <span class="item-text-only text-danger">حذف حساب کاربری</span>
                <svg class="item-icon text-danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </a>

        </div>
    </div>
</body>
</html>
