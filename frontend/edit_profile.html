<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edite profile</title>
    <link rel="stylesheet" href="MainPage.css">
    <script src="setting.js" defer></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="Setting.html" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
            <h1 class="header-main-title" style="font-size: 16px;">ویرایش پروفایل</h1>
            <div class="spacer"></div>
        </div>

        <div style="flex-grow: 1;">
            <div class="pic-container">
                <!-- آیدی برای عکس بنر پروفایل -->
                <img id="editProfilePic" src="https://via.placeholder.com/400x300" alt="Banner" class="cover-img">
            </div>
            
            <div class="upload-option" onclick="document.getElementById('fileInput').click()">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>افزودن عکس</span>
                <!-- فایل ورودی مخفی برای انتخاب عکس توسط کاربر -->
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
            </div>
        </div>

        <div class="bottom-btn-container">
            <a href="Setting.html" class="btn btn-primary">ذخیره تغییرات</a>
        </div>
    </div>
</body>
</html>
